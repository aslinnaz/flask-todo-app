<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ title or "Focus" }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <div class="noise"></div>

  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-mark">F</div>
      <span class="brand-name">Focus</span>
    </div>

    <nav class="sidebar-nav">
      <a href="{{ url_for('tasks_page') }}" class="nav-item {{ 'active' if active_tab=='tasks' else '' }}">
        <span class="nav-icon">◈</span>
        <span>Tasks</span>
      </a>
      <a href="{{ url_for('ideas_page') }}" class="nav-item {{ 'active' if active_tab=='ideas' else '' }}">
        <span class="nav-icon">⊞</span>
        <span>Matrix</span>
      </a>
      <a href="{{ url_for('chat_page') }}" class="nav-item {{ 'active' if active_tab=='chat' else '' }}">
        <span class="nav-icon">◎</span>
        <span>AI Assistant</span>
      </a>
      <a href="{{ url_for('calendar_page') }}" class="nav-item {{ 'active' if active_tab=='calendar' else '' }}">
        <span class="nav-icon">▦</span>
        <span>Calendar</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="tz-badge">🕐 Istanbul</div>
      <button class="close-btn" onclick="closeApp()" title="Close App">
        <span>⏻</span> Close
      </button>
    </div>
  </aside>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <script>
    async function closeApp() {
      if (!confirm("Shut down the server and close the app?")) return;
      try { await fetch("/shutdown", { method: "POST" }); } catch (e) {}
      document.body.innerHTML = `
        <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0a0a0f;color:#888;font-family:'DM Sans',sans-serif;flex-direction:column;gap:16px;">
          <div style="font-size:48px;">⏻</div>
          <div style="font-size:20px;color:#e8e4dc;">Server stopped.</div>
          <div style="font-size:14px;">You can safely close this tab.</div>
        </div>`;
    }
  </script>
</body>
</html>

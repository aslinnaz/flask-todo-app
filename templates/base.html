<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ title or "Focus" }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <div class="noise"></div>

  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-mark">F</div>
      <span class="brand-name">Focus</span>
    </div>

    <nav class="sidebar-nav">
      <a href="{{ url_for('tasks_page') }}" class="nav-item {{ 'active' if active_tab=='tasks' else '' }}">
        <span class="nav-icon">◈</span>
        <span>Tasks</span>
      </a>
      <a href="{{ url_for('ideas_page') }}" class="nav-item {{ 'active' if active_tab=='ideas' else '' }}">
        <span class="nav-icon">⊞</span>
        <span>Matrix</span>
      </a>
      <a href="{{ url_for('chat_page') }}" class="nav-item {{ 'active' if active_tab=='chat' else '' }}">
        <span class="nav-icon">◎</span>
        <span>AI Assistant</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="tz-badge">🕐 Istanbul</div>
      <button class="close-btn" onclick="closeApp()" title="Close App">
        <span>⏻</span> Close
      </button>
    </div>
  </aside>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <script>
    async function closeApp() {
      if (!confirm("Shut down the server and close the app?")) return;
      try { await fetch("/shutdown", { method: "POST" }); } catch (e) {}
      document.body.innerHTML = `
        <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;width:100%;background:#f4f1ec;font-family:'DM Sans',sans-serif;">
          <div style="display:flex;flex-direction:column;align-items:center;text-align:center;gap:0;">
            <div style="width:64px;height:64px;border-radius:18px;background:#8a6d4c;display:flex;align-items:center;justify-content:center;margin-bottom:28px;box-shadow:0 4px 24px rgba(138,109,76,0.3);">
              <span style="font-family:'DM Serif Display',serif;font-size:30px;color:#fff;line-height:1;">F</span>
            </div>
            <div style="font-family:'DM Serif Display',serif;font-size:36px;color:#2c271f;letter-spacing:-0.5px;margin-bottom:12px;">Until next time.</div>
            <div style="font-size:14px;color:#897e70;margin-bottom:36px;">Focus has been closed. Your tasks are saved.</div>
            <div style="display:flex;align-items:center;gap:8px;padding:10px 20px;border-radius:10px;background:#faf8f4;border:1px solid #e2dbd0;font-size:13px;color:#b5ad9f;">
              <span style="opacity:0.5;">⏻</span> You can safely close this tab
            </div>
          </div>
        </div>`;
    }
  </script>
</body>
</html>

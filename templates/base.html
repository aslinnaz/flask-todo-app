<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ title or "Focus" }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <div class="noise"></div>

  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-mark">F</div>
      <span class="brand-name">Focus</span>
    </div>

    <nav class="sidebar-nav">
      <a href="{{ url_for('tasks_page') }}" class="nav-item {{ 'active' if active_tab=='tasks' else '' }}">
        <span class="nav-icon">◈</span>
        <span>Tasks</span>
      </a>
      <a href="{{ url_for('ideas_page') }}" class="nav-item {{ 'active' if active_tab=='ideas' else '' }}">
        <span class="nav-icon">⊞</span>
        <span>Matrix</span>
      </a>
      <a href="{{ url_for('chat_page') }}" class="nav-item {{ 'active' if active_tab=='chat' else '' }}">
        <span class="nav-icon">◎</span>
        <span>AI Assistant</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="tz-badge">🕐 Istanbul</div>
      <button class="close-btn" onclick="closeApp()" title="Close App">
        <span>⏻</span> Close
      </button>
    </div>
  </aside>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <script>
    async function closeApp() {
      if (!confirm("Shut down the server and close the app?")) return;
      try { await fetch("/shutdown", { method: "POST" }); } catch (e) {}
      document.body.innerHTML = `
        <div style="
          display:flex; align-items:center; justify-content:center;
          min-height:100vh; background:#f4f1ec;
          font-family:'DM Sans',sans-serif; flex-direction:column; gap:0;
          position:relative; overflow:hidden;
        ">
          <div style="
            position:absolute; inset:0; opacity:0.015;
            background-image:url('data:image/svg+xml,%3Csvg viewBox=\\'0 0 256 256\\' xmlns=\\'http://www.w3.org/2000/svg\\'%3E%3Cfilter id=\\'noise\\'%3E%3CfeTurbulence type=\\'fractalNoise\\' baseFrequency=\\'0.9\\' numOctaves=\\'4\\' stitchTiles=\\'stitch\\'/%3E%3C/filter%3E%3Crect width=\\'100%25\\' height=\\'100%25\\' filter=\\'url(%23noise)\\'/%3E%3C/svg%3E');
          "></div>
          <div style="
            width:56px; height:56px; border-radius:16px;
            background:#8a6d4c; display:flex; align-items:center; justify-content:center;
            margin-bottom:24px; box-shadow: 0 4px 24px rgba(138,109,76,0.25);
          ">
            <span style="font-family:'DM Serif Display',serif; font-size:28px; color:#fff;">F</span>
          </div>
          <div style="font-family:'DM Serif Display',serif; font-size:32px; color:#2c271f; letter-spacing:-0.5px; margin-bottom:10px;">
            Until next time.
          </div>
          <div style="font-size:14px; color:#897e70; margin-bottom:32px;">
            Focus has been closed. Your tasks are saved.
          </div>
          <div style="
            display:flex; align-items:center; gap:8px;
            padding:10px 18px; border-radius:10px;
            background:#faf8f4; border:1px solid #e2dbd0;
            font-size:13px; color:#b5ad9f;
          ">
            <span style="font-size:16px; opacity:0.5;">⏻</span>
            You can safely close this tab
          </div>
        </div>`;
    }
  </script>
</body>
</html>

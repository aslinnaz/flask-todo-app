<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>To-Do</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <div class="container">
    <header class="header">
      <div>
        <h1>To-Do</h1>
        <p class="sub">Remaining: <b>{{ remaining }}</b> • Total: <b>{{ total }}</b></p>
      </div>

      <nav class="filters">
        <a class="{{ 'active' if filter_value=='all' else '' }}" href="/?filter=all">All</a>
        <a class="{{ 'active' if filter_value=='active' else '' }}" href="/?filter=active">Active</a>
        <a class="{{ 'active' if filter_value=='completed' else '' }}" href="/?filter=completed">Completed</a>
      </nav>
    </header>

    <form class="add" method="POST" action="{{ url_for('add', filter=filter_value) }}">
      <input name="text" placeholder="Add a task..." autocomplete="off" />
      <button type="submit">Add</button>
    </form>

    <section class="list">
      {% for t in tasks %}
        <div class="item {{ 'done' if t['done'] else '' }}">
          <form method="POST" action="{{ url_for('toggle', task_id=t['id'], filter=filter_value) }}">
            <button class="toggle" title="Toggle">
              {{ "✅" if t["done"] else "⬜" }}
            </button>
          </form>

          <div class="text">
            <div class="task">{{ t["text"] }}</div>
            <div class="meta">Created: {{ t["created_at"].replace("T"," ") }} UTC</div>
          </div>

          <form method="POST" action="{{ url_for('delete', task_id=t['id'], filter=filter_value) }}">
            <button class="delete" title="Delete">🗑</button>
          </form>
        </div>
      {% else %}
        <div class="empty">No tasks here 👀</div>
      {% endfor %}
    </section>

    <footer class="footer">
      <div class="footer-left">
        <form method="POST" action="{{ url_for('clear_completed', filter=filter_value) }}">
          <button class="secondary" type="submit">Clear completed</button>
        </form>
      </div>

      <div class="footer-right">
        <button class="danger" type="button" onclick="closeApp()">Close App</button>
      </div>
    </footer>
  </div>

  <script>
    async function closeApp() {
      try {
        // Ask server to shutdown
        await fetch("/shutdown", { method: "POST" });
      } catch (e) {
        // ignore fetch errors (server may stop quickly)
      }

      // Try to close the tab/window
      // Works reliably only if browser allows it (often only for script-opened windows)
      try {
        window.open("", "_self");
        window.close();
      } catch (e) {}

      // Fallback UI if browser blocks closing:
      document.body.innerHTML = `
        <div style="font-family: ui-sans-serif, system-ui; padding: 40px; color: #e7eaf0; background:#0b0f1a; min-height:100vh;">
          <h2>App closed ✅</h2>
          <p>The server has been stopped.</p>
          <p>Your browser may block scripts from closing this tab. You can safely close it now.</p>
        </div>
      `;
    }
  </script>
</body>
</html>
